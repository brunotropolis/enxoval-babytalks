<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Seu e-book · Baby Talks</title>
<link rel="icon" type="image/x-icon" href="https://babytalks.com.br/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400..800;1,9..144,400..800&family=DM+Sans:wght@400;500;600;700&display=swap" />
<style>
  :root {
    --lilas: #8E9BD1;
    --lilas-claro: #B0BCE5;
    --lilas-escuro: #6F7EB8;
    --magenta: #C95FA3;
    --magenta-suave: #D89FC4;
    --magenta-escuro: #9B3775;
    --azul: #1F2A56;
    --azul-suave: rgba(31, 42, 86, 0.7);
    --azul-medio: rgba(31, 42, 86, 0.5);
    --branco-suave: #F8F7F4;
    --rosa-bebe: #F4DCE8;
    --lavanda: #E4E6F2;
    --verde: #2EA66C;
    --verde-bright: #3FBE7E;
    --border: rgba(142, 155, 209, 0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--branco-suave);
    color: var(--azul);
    line-height: 1.7;
    font-weight: 400;
    letter-spacing: 0.005em;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  @keyframes pulse-soft {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46, 166, 108, 0.45); }
    50% { box-shadow: 0 0 0 14px rgba(46, 166, 108, 0); }
  }
  .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

  /* ============ CONFIRM ============ */
  .confirm {
    background: linear-gradient(180deg, var(--lilas-claro) 0%, var(--lavanda) 55%, var(--branco-suave) 100%);
    padding: 64px 0 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .confirm-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--verde);
    background: white;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 22px;
    box-shadow: 0 2px 8px rgba(31, 42, 86, 0.06);
  }
  .confirm-eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--verde);
  }
  .confirm-title {
    font-family: 'Fraunces', serif;
    font-size: 46px;
    line-height: 1.08;
    color: var(--azul);
    letter-spacing: -0.018em;
    font-weight: 600;
    max-width: 640px;
    margin: 0 auto 14px;
  }
  .confirm-title .accent { color: var(--magenta); font-style: italic; font-weight: 500; }
  .confirm-sub {
    font-size: 16px;
    color: var(--azul-suave);
    max-width: 500px;
    margin: 0 auto 32px;
  }
  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    background: var(--verde);
    border: 2px solid var(--verde);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    text-decoration: none;
    border-radius: 6px;
    animation: pulse-soft 2.4s ease-in-out infinite;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-download:hover { background: var(--verde-bright); border-color: var(--verde-bright); }
  .btn-download svg { width: 18px; height: 18px; }
  .download-nota {
    display: block;
    margin-top: 14px;
    font-size: 12px;
    color: var(--azul-medio);
    letter-spacing: 0.02em;
  }

  /* ============ CONVITE (colado no download) ============ */
  .convite {
    padding: 32px 0 88px;
    background: var(--branco-suave);
  }
  .convite-inner {
    max-width: 920px;
    margin: 0 auto;
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 48px;
    box-shadow: 0 20px 50px rgba(31, 42, 86, 0.08);
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 40px;
    align-items: center;
  }
  .convite-foto {
    aspect-ratio: 0.82;
    border-radius: 60px 12px 46px 12px;
    overflow: hidden;
    background: var(--lavanda);
    box-shadow: 0 14px 32px rgba(31, 42, 86, 0.14);
  }
  .convite-foto img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    object-position: center 25%;
  }
  .convite-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--rosa-bebe);
    color: var(--magenta-escuro);
    padding: 7px 16px 7px 14px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .convite-tag .pin {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--magenta);
  }
  .convite-tag.geral {
    background: transparent;
    color: var(--magenta);
    border: 1.5px solid var(--magenta-suave);
    font-size: 11px;
  }
  .convite-tag.geral .pin { display: none; }
  .convite-quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18px;
    line-height: 1.4;
    color: var(--azul);
    padding: 14px 18px;
    background: var(--branco-suave);
    border-left: 3px solid var(--magenta);
    border-radius: 4px;
    margin-bottom: 20px;
  }
  .convite-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    line-height: 1.12;
    color: var(--azul);
    letter-spacing: -0.015em;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .convite-title .accent { color: var(--magenta); font-style: italic; font-weight: 500; }
  .convite-desc {
    font-size: 15px;
    color: var(--azul-suave);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .convite-desc strong { color: var(--azul); font-weight: 600; }
  .convite-dados {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 22px;
    margin-bottom: 22px;
    font-size: 13.5px;
    color: var(--azul-suave);
  }
  .convite-dados .item {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .convite-dados .item::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--magenta);
    display: inline-block;
  }
  .btns-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn.primary {
    background: var(--magenta); color: white; border-color: var(--magenta);
  }
  .btn.primary:hover { background: var(--magenta-suave); border-color: var(--magenta-suave); }
  .btn.ghost {
    background: transparent; color: var(--azul); border-color: var(--border);
  }
  .btn.ghost:hover { border-color: var(--lilas); color: var(--magenta); }
  .btn svg { width: 15px; height: 15px; }

  /* ============ FOOTER EVENTO (mesmo do index) ============ */
  footer.evento-footer {
    background: var(--azul);
    color: white;
    padding: 48px 0 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  footer.evento-footer::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at top, rgba(201, 95, 163, 0.14) 0%, transparent 60%);
    pointer-events: none;
  }
  .evento-inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .evento-logo img { height: 84px; width: auto; display: block; }
  .evento-eyebrow {
    font-family: 'Anton', sans-serif;
    font-size: 12px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--magenta-suave);
    display: flex; align-items: center; gap: 12px;
  }
  .evento-eyebrow::before, .evento-eyebrow::after {
    content: ''; display: inline-block;
    width: 32px; height: 1px;
    background: rgba(255, 255, 255, 0.28);
  }
  .evento-data {
    font-family: 'Fraunces', serif;
    font-style: italic; font-weight: 500;
    font-size: 28px; line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .evento-data .destaque { color: var(--magenta-suave); }
  .evento-local {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.72);
    max-width: 480px;
    line-height: 1.55;
  }
  .evento-cta {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 4px;
    padding: 12px 26px;
    background: transparent;
    border: 1.5px solid rgba(255, 255, 255, 0.32);
    color: white;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    text-decoration: none;
    border-radius: 100px;
    transition: all 0.2s ease;
  }
  .evento-cta:hover {
    background: white; color: var(--azul); border-color: white;
  }
  .evento-cta svg { width: 14px; height: 14px; }
  .evento-fine {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.42);
    letter-spacing: 0.06em;
    margin-top: 18px;
  }

  /* ============ MOBILE ============ */
  @media (max-width: 720px) {
    .confirm { padding: 40px 0 32px; }
    .confirm-title { font-size: 30px; }
    .confirm-sub { font-size: 15px; margin-bottom: 26px; }
    .btn-download { padding: 14px 24px; font-size: 12.5px; }
    .convite { padding: 24px 0 56px; }
    .convite-inner {
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 28px 22px;
      text-align: center;
    }
    .convite-foto {
      max-width: 200px;
      margin: 0 auto;
      aspect-ratio: 1;
      border-radius: 44px 10px 32px 10px;
    }
    .convite-title { font-size: 24px; }
    .convite-desc { font-size: 14.5px; }
    .convite-dados { justify-content: center; }
    .btns-row { justify-content: center; }
    .btn { padding: 11px 20px; font-size: 12px; }
  }
</style>
</head>
<body>

<section class="confirm">
  <div class="container">
    <span class="confirm-eyebrow"><span class="dot"></span> Pronto</span>
    <h1 class="confirm-title">Seu e-book <span class="accent" id="nome-personalizado">está aqui</span></h1>
    <a href="/ebook-enxoval-descomplicado.pdf" class="btn-download" download="Enxoval-Descomplicado-Baby-Talks.pdf">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      Baixar o e-book
    </a>
    <span class="download-nota">PDF · aproximadamente 4 MB</span>
  </div>
</section>

<section class="convite" id="convite-box">
  <!-- injetado via JS conforme DDD -->
</section>

<footer class="evento-footer">
  <div class="container">
    <div class="evento-inner">
      <a href="https://babytalks.com.br" target="_blank" rel="noopener" class="evento-logo">
        <img src="https://babytalks.com.br/images/logo-baby-talks-dark.png" alt="Baby Talks" onerror="this.src='https://babytalks.com.br/images/logo-baby-talks.png';this.style.filter='brightness(0) invert(1)'" />
      </a>
      <span class="evento-eyebrow">Save the date</span>
      <div class="evento-data">Sábado, <span class="destaque">22 de agosto</span> de 2026</div>
      <div class="evento-local">Teatro Santo Anjo, Barigui · Curitiba/PR</div>
      <a href="https://babytalks.com.br" target="_blank" rel="noopener" class="evento-cta">
        Conheça o evento
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </a>
      <span class="evento-fine">babytalks.com.br</span>
    </div>
  </div>
</footer>

<script>
  const EVENTO_URL = 'https://babytalks.com.br';
  const FOTO_EVENTO = 'https://babytalks.com.br/images/dayane.jpg';

  const lead = JSON.parse(sessionStorage.getItem('ebook-lead') || '{}');
  const ddd = lead.ddd || '';
  const nome = (lead.nome || '').split(' ')[0];
  const isCwb = ddd === '41';

  if (nome) {
    document.getElementById('nome-personalizado').textContent = 'chegou, ' + nome;
  }

  const box = document.getElementById('convite-box');
  const dadosBase = `
    <div class="convite-dados">
      <span class="item">Sábado, 22 de agosto</span>
      <span class="item">8h30 às 13h30</span>
      <span class="item">Teatro Santo Anjo, Curitiba</span>
    </div>`;

  if (isCwb) {
    box.innerHTML = `
      <div class="container">
        <div class="convite-inner">
          <div class="convite-foto"><img src="${FOTO_EVENTO}" alt="Dayane Dos Anjos" /></div>
          <div>
            <span class="convite-tag"><span class="pin"></span> Você é de Curitiba</span>
            <h2 class="convite-title">E o <span class="accent">Baby Talks</span> vai ser aqui do seu lado</h2>
            <p class="convite-desc">
              Se o e-book já te ajuda, imagina uma manhã inteira com a <strong>Dayane</strong> e outros especialistas te preparando para a chegada do bebê, ao vivo.
            </p>
            ${dadosBase}
            <div class="btns-row">
              <a href="${EVENTO_URL}" target="_blank" rel="noopener" class="btn primary">
                Ver ingressos
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
              </a>
            </div>
          </div>
        </div>
      </div>`;
  } else {
    box.innerHTML = `
      <div class="container">
        <div class="convite-inner">
          <div class="convite-foto"><img src="${FOTO_EVENTO}" alt="Dayane Dos Anjos" /></div>
          <div>
            <span class="convite-tag geral">Baby Talks · 22 de agosto</span>
            <h2 class="convite-title">Venha nos <span class="accent">visitar</span> em Curitiba</h2>
            <p class="convite-desc">
              O <strong>Baby Talks</strong> é um evento presencial: uma manhã inteira de preparação com a <strong>Dayane</strong> e outros especialistas para casais grávidos.
            </p>
            <p class="convite-quote">
              Se você conhece uma gestante em Curitiba, ou que quer ir, <strong>compartilhe</strong>:
            </p>
            <div class="btns-row">
              <button type="button" class="btn primary" id="btn-share">
                Compartilhar
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
              </button>
              <a href="${EVENTO_URL}" target="_blank" rel="noopener" class="btn ghost">Conhecer o evento</a>
            </div>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-share').addEventListener('click', async () => {
      const shareData = {
        title: 'Baby Talks · 22 de agosto, Curitiba',
        text: 'Achei esse evento para gestantes em Curitiba, super bacana:',
        url: EVENTO_URL
      };
      try {
        if (navigator.share) await navigator.share(shareData);
        else {
          await navigator.clipboard.writeText(EVENTO_URL);
          const b = document.getElementById('btn-share');
          const o = b.innerHTML;
          b.innerHTML = 'Link copiado';
          setTimeout(() => b.innerHTML = o, 2200);
        }
      } catch (e) { /* cancelado */ }
    });
  }
</script>

</body>
</html>
